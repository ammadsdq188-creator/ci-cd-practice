name: Simple CI Pipeline

on: [push]

jobs:
  check:   # ✅ MUST be 'check'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check file
        run: |
          if [ -f app.txt ]; then
            echo "File exists"
          else
            echo "Missing file"
            exit 1
          fi

  build:
    needs: check   # ✅ matches exactly
    runs-on: ubuntu-latest

    steps:
      - name: Build step
        run: echo "building project"

      - name: Use secret
        run: echo "secret is ${{ secrets.MY_SECRET }}"

  info:
    needs: build   # ✅ correct chain
    runs-on: ubuntu-latest

    steps:
      - name: Final step
        run: echo "pipeline completed"
