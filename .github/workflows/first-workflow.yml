name: Multi Line Workflow

on: [push]

jobs:
  check-file:
    runs-on: ubuntu-latest

steps:
  - name: checkout code
    uses: actions/checkout@v3

  - name: check file exists
    run: |
      if [ -f app.txt ]; then
        echo "file exists"
      else
        echo "File missing"
        exit 1
      fi

second-job:
  needs: check-file
  runs-on: ubuntu-latest

steps:
  - name: Second job message
    run: echo "Second job running"
