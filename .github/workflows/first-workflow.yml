name: Artifact Demo

on: [push]

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "Hello from job 1" > output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: output.txt

  job2:
    needs: job1
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Read file
        run: cat output.txt
